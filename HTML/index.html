<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KREYBA ESSENCES | Tienda Oficial</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div id="scroll-progress" class="scroll-progress-bar"></div>

  <header id="main-header" class="main-header">
    <div class="container header-container">
      
      <div class="header-left">
        <button id="menu-toggle" class="menu-toggle" aria-label="Abrir menú de navegación">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
        
        <nav class="desktop-nav">
          <ul class="nav-list">
            <li><a href="#inicio" class="nav-link active">Inicio</a></li>
            <li class="nav-item-dropdown">
              <a href="#productos" class="nav-link">Productos</a>
              <ul class="dropdown-menu">
                <li><a href="#perfumes">Perfumes</a></li>
                <li><a href="#esencias">Esencias</a></li>
              </ul>
            </li>
            <li><a href="#promociones" class="nav-link">Promociones</a></li>
          </ul>
        </nav>
      </div>

      <div class="header-center">
        <a href="#inicio" class="logo">
          <span class="logo-text">KREYBA ESSENCES</span>
        </a>
      </div>

      <div class="header-right">
        <nav class="desktop-nav">
          <ul class="nav-list">
            <li><a href="#nosotros" class="nav-link">Nosotros</a></li>
            <li><a href="#contacto" class="nav-link">Contacto</a></li>
          </ul>
        </nav>
        
        <div class="header-actions">
          <button id="theme-toggle" class="action-btn" aria-label="Cambiar modo de luz">
            <svg class="icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.38 5.38 0 0 1-4.4 2.11 5.4 5.4 0 0 1-5.4-5.4c0-1.8 1-3.37 2.47-4.19A9 9 0 0 0 12 3z"/></svg>
          </button>
          
          <button id="cart-toggle" class="action-btn cart-btn" aria-label="Ver carrito">
            <svg class="icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M6 2L3.05 6.79A2 2 0 0 0 3 7.78V19a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7.78a2 2 0 0 0-.05-.99L18 2H6z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span id="cart-count" class="cart-badge">0</span>
          </button>
        </div>
      </div>

    </div>
  </header>

  <script src="js/components/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
